name: Auto bump patch

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bump-version:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Bump version
        run: python bump_version.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bump-version
          title: "Auto bump patch version"
          commit-message: "Auto bump patch version"
          body: "Automatic PATCH version bump"
          delete-branch: true