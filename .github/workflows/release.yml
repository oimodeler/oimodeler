name: Release

on:
  push:
    branches:
      - main
    tags-ignore:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' oimodeler/__init__.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Detect commit type
        id: detect
        run: |
          MSG=$(git log -1 --pretty=%B)

          if echo "$MSG" | grep -q "MAJOR:"; then
            LEVEL="MAJOR"
          elif echo "$MSG" | grep -q "MINOR:"; then
            LEVEL="MINOR"
          else
            LEVEL="PATCH"
          fi

          if echo "$MSG" | grep -q "TAG:"; then
            TAG_REQUEST="true"
          else
            TAG_REQUEST="false"
          fi

          echo "level=$LEVEL" >> $GITHUB_OUTPUT
          echo "tag=$TAG_REQUEST" >> $GITHUB_OUTPUT

      - name: Decide if tag should be created
        id: decision
        run: |
          if [ "${{ steps.detect.outputs.level }}" = "PATCH" ] && [ "${{ steps.detect.outputs.tag }}" != "true" ]; then
            echo "create_tag=false" >> $GITHUB_OUTPUT
          else
            echo "create_tag=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Git tag (if not exists)
        if: steps.decision.outputs.create_tag == 'true'
        run: |
          VERSION="v${{ steps.version.outputs.version }}"

          # Check local tag
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists locally → skipping"
            exit 0
          fi

          # Check remote tag
          if git ls-remote --tags origin | grep -q "$VERSION"; then
            echo "Tag already exists on remote → skipping"
            exit 0
          fi

          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        if: steps.decision.outputs.create_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true