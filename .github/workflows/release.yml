name: Release

on:
  push:
    branches:
      - main
    tags-ignore:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------
      # 1. READ VERSION (SOURCE OF TRUTH)
      # ----------------------------
      - name: Get version from package
        id: version
        run: |
          VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' oimodeler/__init__.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      # ----------------------------
      # 2. DETECT TAG REQUEST
      # ----------------------------
      - name: Detect TAG request
        id: detect
        run: |
          MSG=$(git log -1 --pretty=%B)

          echo "Commit message:"
          echo "$MSG"

          if echo "$MSG" | grep -qE "\(\s*TAG\s*\)"; then
            echo "tag=true" >> $GITHUB_OUTPUT
          else
            echo "tag=false" >> $GITHUB_OUTPUT
          fi

      # ----------------------------
      # 3. DECIDE IF TAG SHOULD BE CREATED
      # ----------------------------
      - name: Decide tag creation
        id: decision
        run: |
          if [ "${{ steps.detect.outputs.tag }}" = "true" ]; then
            echo "create_tag=true" >> $GITHUB_OUTPUT
          else
            echo "create_tag=false" >> $GITHUB_OUTPUT
          fi

      # ----------------------------
      # 4. CREATE GIT TAG (SAFE + IDEMPOTENT)
      # ----------------------------
      - name: Create Git tag
        if: steps.decision.outputs.create_tag == 'true'
        run: |
          VERSION="v${{ steps.version.outputs.version }}"

          echo "Creating tag $VERSION"

          if git ls-remote --tags origin | grep -q "$VERSION"; then
            echo "Tag already exists → skipping"
            exit 0
          fi

          git tag "$VERSION"
          git push origin "$VERSION"

      # ----------------------------
      # 5. CREATE GITHUB RELEASE
      # ----------------------------
      - name: Create GitHub Release
        if: steps.decision.outputs.create_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true