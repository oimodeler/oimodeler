name: Release

on:
  workflow_run:
    workflows: ["Auto Bump Version"]
    types:
      - completed

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest code
        run: |
          git fetch origin main
          git checkout main

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' oimodeler/__init__.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Detect TAG request
        id: detect
        run: |
          MSG=$(git log -1 --pretty=%B)

          if echo "$MSG" | grep -qE "\(\s*TAG\s*\)"; then
            echo "tag=true" >> $GITHUB_OUTPUT
          else
            echo "tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Decide tag creation
        id: decision
        run: |
          if [ "${{ steps.detect.outputs.tag }}" = "true" ]; then
            echo "create_tag=true" >> $GITHUB_OUTPUT
          else
            echo "create_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Git tag
        if: steps.decision.outputs.create_tag == 'true'
        run: |
          VERSION="v${{ steps.version.outputs.version }}"

          if git ls-remote --tags origin | grep -q "$VERSION"; then
            echo "Tag exists → skip"
            exit 0
          fi

          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        if: steps.decision.outputs.create_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true