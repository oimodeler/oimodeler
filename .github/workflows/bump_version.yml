name: Auto Bump Version

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Run bump script
        run: python bump_version.py

      - name: Create Pull Request instead of push
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bump-version
          title: "BUMP: auto version update"
          commit-message: "BUMP: auto version update"
          base: main
          delete-branch: true