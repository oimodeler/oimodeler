name: Docs Build

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'README.md'

jobs:
  docs:
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: echo "Docs rebuilt via Read the Docs"